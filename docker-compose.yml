services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: packablock-registry
    ports:
      - "3030:3030"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3030
      - DATABASE_FILE=/data/packablock.sqlite
      - ADMIN_TOKEN=admin_secret_token_1234
    volumes:
      - ./data:/data
    restart: unless-stopped
